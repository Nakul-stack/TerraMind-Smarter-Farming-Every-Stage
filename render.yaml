services:
  - type: web
    name: terramind-backend
    env: python
    plan: free
    rootDir: .
    buildCommand: pip install -r backend/requirements.txt
    startCommand: python -m uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT --loop asyncio
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHONPATH
        value: backend
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL_NAME
        value: z-ai/glm-4.5-air:free
      - key: OPENROUTER_TEMPERATURE
        value: "0.3"
      - key: OPENROUTER_TIMEOUT
        value: "120"
      - key: OPENROUTER_REASONING_EFFORT
        value: low
      - key: GRAPH_RAG_MODEL
        value: z-ai/glm-4.5-air:free
      - key: GRAPH_RAG_FALLBACK_MODEL
        value: z-ai/glm-4.5-air:free
      - key: GRAPH_RAG_MODEL_CANDIDATES
        value: z-ai/glm-4.5-air:free
      - key: GRAPH_RAG_LLM_MAX_TOKENS
        value: "1200"
      - key: GRAPH_RAG_LLM_RETRY_MAX_TOKENS
        value: "1600"
      - key: TERRAMIND_HOST
        value: 0.0.0.0
      - key: TERRAMIND_PORT
        value: "10000"

  - type: web
    env: static
    name: terramind-frontend
    rootDir: frontend
    buildCommand: npm install && VITE_API_BASE_URL=https://terramind-backend-jgoj.onrender.com npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: false